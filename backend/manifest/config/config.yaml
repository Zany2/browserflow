server:
  address: ":8001"
  name: backend
  clientMaxBodySize: 0
  openapiPath: "/web.json"
  swaggerPath: "/swagger"

# 应用运行模式：windows 本地版，server 服务器调度版
app:
  mode: "server"

# 日志配置
logger:
  path:                  "./logs/"           # 日志文件路径。默认为空，表示关闭，仅输出到终端
  file:                  "{Y-m-d}.log"         # 日志文件格式。默认为"{Y-m-d}.log"
  prefix:                ""                    # 日志内容输出前缀。默认为空
  level:                 "ALL"                 # 日志输出级别
  timeFormat:            "2006-01-02 15:04:05" # 自定义日志输出的时间格式，使用Golang标准的时间格式配置
  ctxKeys:               []                    # 自定义Context上下文变量名称，自动打印Context的变量到日志中。默认为空
  header:                true                  # 是否打印日志的头信息。默认true
  stdout:                true                  # 日志是否同时输出到终端。默认true
  rotateSize:            "20M"                 # 按照日志文件大小对文件进行滚动切分。默认为0，表示关闭滚动切分特性
  rotateExpire:          "1d"                  # 按照日志文件时间间隔对文件滚动切分。默认为0，表示关闭滚动切分特性
  rotateBackupLimit:     10                    # 按照切分的文件数量清理切分文件，当滚动切分特性开启时有效。默认为0，表示不备份，切分则删除
  rotateBackupExpire:    0                     # 按照切分的文件有效期清理切分文件，当滚动切分特性开启时有效。默认为0，表示不备份，切分则删除
  rotateBackupCompress:  0                     # 滚动切分文件的压缩比（0-9）。默认为0，表示不压缩
  rotateCheckInterval:   "1h"                  # 滚动切分的时间检测间隔，一般不需要设置。默认为1小时
  stdoutColorDisabled:   false                 # 关闭终端的颜色打印。默认开启
  writerColorEnable:     false                 # 日志文件是否带上颜色。默认false，表示不带颜色

# 本地文件存储配置
localStorage:
  path: "data/browserflow.db"

# 前端访问地址
frontend:
  url: "http://localhost:5173"

# 数据库配置
database:
  logger:
    path: "./logs/sql"
    level: "all"
    stdout: true
  default:
    link: "pgsql:postgres:daixk@tcp(192.168.19.104:5432)/browserflow"
    debug: true

# Redis配置
redis:
  default:
    address: 192.168.19.104:6379
    db: 0
    pass: root